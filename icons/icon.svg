<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1e3a5f"/>

  <!-- Taxi body -->
  <rect x="96" y="230" width="320" height="130" rx="20" fill="#f5c842"/>

  <!-- Taxi roof -->
  <path d="M160 230 L185 155 Q192 140 210 140 L302 140 Q320 140 327 155 L352 230 Z" fill="#f5c842"/>

  <!-- Taxi sign on roof -->
  <rect x="215" y="128" width="82" height="28" rx="6" fill="#1e3a5f"/>
  <text x="256" y="147" font-family="Arial" font-weight="bold" font-size="16" fill="#f5c842" text-anchor="middle">TAXI</text>

  <!-- Windows -->
  <rect x="196" y="158" width="90" height="58" rx="8" fill="#a8d4f5"/>
  <rect x="298" y="158" width="42" height="58" rx="8" fill="#a8d4f5"/>

  <!-- Door line -->
  <line x1="292" y1="230" x2="292" y2="360" stroke="#e0a800" stroke-width="4"/>

  <!-- Wheels -->
  <circle cx="165" cy="362" r="38" fill="#1e3a5f"/>
  <circle cx="165" cy="362" r="24" fill="#555"/>
  <circle cx="165" cy="362" r="10" fill="#aaa"/>
  <circle cx="347" cy="362" r="38" fill="#1e3a5f"/>
  <circle cx="347" cy="362" r="24" fill="#555"/>
  <circle cx="347" cy="362" r="10" fill="#aaa"/>

  <!-- Front grill / bumper -->
  <rect x="390" y="290" width="26" height="50" rx="8" fill="#e0a800"/>

  <!-- Headlights -->
  <rect x="390" y="248" width="26" height="28" rx="6" fill="#fff9c4"/>

  <!-- Dollar sign overlay (bottom right) -->
  <circle cx="390" cy="390" r="62" fill="#2f9e44"/>
  <text x="390" y="408" font-family="Arial" font-weight="bold" font-size="72" fill="#fff" text-anchor="middle">$</text>
</svg>
