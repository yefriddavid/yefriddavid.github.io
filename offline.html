<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · Mi Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #06060f;
      color: #fff;
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 460px;
      width: 100%;
    }

    /* ── Orbiting icon ── */
    .icon-wrap {
      width: 130px;
      height: 130px;
      margin: 0 auto 36px;
      position: relative;
    }

    .orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.07);
      animation: spin 9s linear infinite;
    }
    .orbit::before {
      content: '';
      position: absolute;
      width: 9px; height: 9px;
      background: #7c3aed;
      border-radius: 50%;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 14px 4px rgba(124,58,237,.7);
    }
    .orbit-2 {
      inset: 14px;
      animation: spin 5.5s linear infinite reverse;
    }
    .orbit-2::before {
      background: #06b6d4;
      box-shadow: 0 0 14px 4px rgba(6,182,212,.7);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon-inner {
      position: absolute;
      inset: 22px;
      background: rgba(255,255,255,.03);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-inner svg {
      width: 46px; height: 46px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: .6; }
      50%       { transform: translateY(-4px) scale(1.06); opacity: 1; }
    }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.28);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #f87171;
      margin-bottom: 22px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f87171;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .15; }
    }

    /* ── Glitch title ── */
    .glitch {
      position: relative;
      font-size: clamp(2.8rem, 9vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1;
      color: #fff;
      margin-bottom: 20px;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #0ff;
      animation: g1 4s infinite;
    }
    .glitch::after {
      color: #f0f;
      animation: g2 4s infinite;
    }
    @keyframes g1 {
      0%,88%,100% { clip-path: inset(100% 0 0 0); transform: translate(0); }
      90% { clip-path: inset(18% 0 64% 0); transform: translate(-5px, 2px); }
      92% { clip-path: inset(72% 0  8% 0); transform: translate( 4px,-2px); }
      94% { clip-path: inset(42% 0 38% 0); transform: translate(-3px, 0);   }
      96% { clip-path: inset(82% 0  4% 0); transform: translate( 3px, 1px); }
    }
    @keyframes g2 {
      0%,83%,100% { clip-path: inset(100% 0 0 0); transform: translate(0); }
      85% { clip-path: inset(52% 0 28% 0); transform: translate( 4px,-1px); }
      87% { clip-path: inset(12% 0 68% 0); transform: translate(-4px, 2px); }
      89% { clip-path: inset(62% 0 18% 0); transform: translate( 2px, 0);   }
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: .98rem;
      color: rgba(255,255,255,.38);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 40px;
      letter-spacing: .01em;
    }

    /* ── Retry button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px 36px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .05em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 0 28px rgba(124,58,237,.35);
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
      opacity: 0;
      transition: opacity .35s;
    }
    .btn:hover  { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(124,58,237,.55); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(-1px); }
    .btn span, .btn svg { position: relative; z-index: 1; }
    .btn svg { animation: spin-btn 0s linear; }
    .btn.loading svg { animation: spin-btn .7s linear infinite; }

    @keyframes spin-btn { to { transform: rotate(360deg); } }

    /* ── Hint text ── */
    .hint {
      margin-top: 24px;
      font-size: .76rem;
      color: rgba(255,255,255,.2);
      letter-spacing: .06em;
    }

    /* ── Online toast ── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-90px);
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      padding: 13px 28px;
      border-radius: 100px;
      font-size: .85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 28px rgba(16,185,129,.45);
      transition: transform .45s cubic-bezier(.34,1.56,.64,1);
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="toast" id="toast">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Conexión restablecida — recargando…
  </div>

  <div class="container">

    <div class="icon-wrap">
      <div class="orbit"></div>
      <div class="orbit orbit-2"></div>
      <div class="icon-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2" y1="2" x2="22" y2="22" stroke="rgba(248,113,113,.9)" stroke-width="1.8"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"  stroke="rgba(255,255,255,.5)"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"     stroke="rgba(255,255,255,.5)"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"           stroke="rgba(255,255,255,.3)"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"        stroke="rgba(255,255,255,.3)"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"              stroke="rgba(255,255,255,.6)"/>
          <circle cx="12" cy="20" r="1.2" fill="rgba(255,255,255,.6)" stroke="none"/>
        </svg>
      </div>
    </div>

    <div class="badge"><div class="badge-dot"></div>Sin conexión</div>

    <h1 class="glitch" data-text="Desconectado">Desconectado</h1>

    <p class="subtitle">
      No se encontró señal de red.<br>
      Verifica tu conexión e intenta de nuevo.
    </p>

    <button class="btn" id="btn" onclick="retry()">
      <svg id="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      <span>Intentar de nuevo</span>
    </button>

    <p class="hint" id="hint">Escuchando señal de red…</p>
  </div>

  <script>
    // ── Starfield ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('c')
    const ctx    = canvas.getContext('2d')
    let stars = []

    const COLORS = ['255,255,255', '180,160,255', '100,220,255']

    function resize() {
      canvas.width  = window.innerWidth
      canvas.height = window.innerHeight
      stars = Array.from({ length: 220 }, () => ({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height,
        r:     Math.random() * 1.3 + 0.15,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2,
      }))
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      for (const s of stars) {
        const a = 0.15 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase))
        ctx.beginPath()
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
        ctx.fillStyle = `rgba(${s.color},${a.toFixed(2)})`
        ctx.fill()
      }
      requestAnimationFrame(draw)
    }

    window.addEventListener('resize', resize)
    resize()
    requestAnimationFrame(draw)

    // ── Shooting stars ─────────────────────────────────────────────────────────
    function shoot() {
      const x = Math.random() * canvas.width
      const y = Math.random() * canvas.height * 0.5
      const len = 80 + Math.random() * 120
      const angle = Math.PI / 5
      let progress = 0

      ;(function step() {
        if (progress > 1) return
        const cx = x + Math.cos(angle) * len * progress
        const cy = y + Math.sin(angle) * len * progress
        ctx.save()
        ctx.beginPath()
        ctx.moveTo(cx, cy)
        ctx.lineTo(cx - Math.cos(angle) * 20, cy - Math.sin(angle) * 20)
        ctx.strokeStyle = `rgba(255,255,255,${(1 - progress) * 0.6})`
        ctx.lineWidth = 1.5
        ctx.stroke()
        ctx.restore()
        progress += 0.04
        requestAnimationFrame(step)
      })()

      setTimeout(shoot, 2500 + Math.random() * 4000)
    }
    setTimeout(shoot, 1500)

    // ── Retry ──────────────────────────────────────────────────────────────────
    function retry() {
      const btn = document.getElementById('btn')
      btn.classList.add('loading')
      btn.disabled = true
      setTimeout(() => window.location.reload(), 400)
    }

    // ── Auto-reload when back online ───────────────────────────────────────────
    window.addEventListener('online', () => {
      document.getElementById('hint').textContent = '¡Señal detectada!'
      document.getElementById('toast').classList.add('show')
      setTimeout(() => window.location.reload(), 2000)
    })
  </script>
</body>
</html>
