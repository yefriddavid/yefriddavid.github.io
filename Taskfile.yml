version: '3'

env:
  NODE_OPTIONS: --max-old-space-size=8192

tasks:
  dev:
    desc: Start dev server at http://localhost:3000
    cmd: npm start

  build:
    desc: Production build (outputs to /build)
    cmd: npm run build

  serve:
    desc: Preview production build
    cmd: npm run serve

  deploy:
    desc: Build and deploy to GitHub Pages
    cmd: npm run deploy

  lint:
    desc: Run ESLint
    cmd: npm run lint

  lint:fix:
    desc: Run ESLint with auto-fix
    cmd: npm run lint:fix

  test:
    desc: Run unit tests (vitest)
    cmd: npm run test

  test:watch:
    desc: Run unit tests in watch mode
    cmd: npm run test:watch

  cy:open:
    desc: Open Cypress test runner
    cmd: npm run cy:open

  cy:run:
    desc: Run Cypress e2e tests against localhost:3000
    cmd: npm run cy:run

  cy:comp:
    desc: Run Cypress component tests
    cmd: npm run cy:comp

  cy:comp:open:
    desc: Open Cypress component test runner
    cmd: npm run cy:comp:open

  copy-to-test:
    desc: Copy production build to test environment
    cmd: npm run copy-to-test

  check:
    desc: Lint + unit tests
    deps: [lint, test, cy:run, cy:comp]

  ci:
    desc: Full CI pipeline — lint, unit tests, build
    cmds:
      - task: lint
      - task: test
      - task: build

  cli:build:
    desc: Bundle the CLI (cli/dist/index.js)
    cmd: npm run cli:build

  cli:domotica:voltage:
    desc: "Voltage history — options: --from <date> --to <date> --limit <n> --format table|json"
    cmd: npm run cli -- voltage {{.CLI_ARGS}}

  cli:domotica:current:
    desc: "Current history — options: --from <date> --to <date> --limit <n> --format table|json"
    cmd: npm run cli -- current {{.CLI_ARGS}}

  cli:taxi:drivers:
    desc: "List tapsi drivers — requires --tenant <id>; optional: --inactive --format table|json"
    cmd: npm run cli -- drivers {{.CLI_ARGS}}

  cli:taxi:vehicles:
    desc: "List tapsi vehicles — requires --tenant <id>; optional: --inactive --format table|json"
    cmd: npm run cli -- vehicles {{.CLI_ARGS}}

  cli:sys:tenants:
    desc: "List tenants — --user <u> --pass <p>; optional: --inactive --format table|json"
    cmd: npm run cli -- sys tenants {{.CLI_ARGS}}

  cli:sys:users:
    desc: "List users — --user <u> --pass <p>; optional: --tenant <id> --inactive --format table|json"
    cmd: npm run cli -- sys users {{.CLI_ARGS}}

  cli:finance:account-status:
    desc: "Monthly account status — requires --tenant <id>; optional: --month <1-12> --year <n> --type Incoming|Outcoming|all --user <u> --pass <p> --format table|json"
    cmd: npm run cli -- finance account-status {{.CLI_ARGS}}
